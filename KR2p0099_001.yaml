body:
  text: 武威漢代醫簡第二類簡治魯氏青行解解腹方麻黃卅分大黃十五分厚朴石膏苦參各六分烏喙付子各二分凡七物皆并冶合和以方寸匕一飲之良甚皆𢠚傷寒逐風治心腹大積上下行如蟲狀大恿方班𨱞十枚地一枚桂一寸凡三物皆并冶合和使病者宿毋食旦飲藥一刀圭以肥美十日一飲藥如有徵當出從治伏梁裏膿在胃腸之外方大黃芩勺藥各一兩消石二兩桂一尺桑卑肖十四枚䗪蟲三枚凡七物皆父且漬以淳酒五升卒時煮之三去中令病後不復發方𥥯地長與人等深七尺橫五尺用白羊矢乾之十餘石置其坑中從火其上羊矢盡索橫木坑上取其卧人卧其坑上熱氣盡乃止其病者慎勿得出見治金創內漏血不出方藥用大黃𣍝二分曾青二分消石二分䗪蟲三分虻頭二分凡五物皆冶合和以方寸匕一酒飲不過再飲血立出不即從大便出治金創止慂方石膏一分薑二分甘草一分桂一分凡四物皆冶合和以方寸寸酢漿飲之日再夜一良甚勿傳也治金腸出方治龍骨三指撮以豉汁飲之日再三飲腸自為入大良勿傳也治潰醫不能治禁方其不𢠚者半夏白斂勺藥細辛烏喙赤石脂貸赭赤豆初生未卧者矢凡九物皆并冶合其分各等合和治千金膏藥方蜀椒四升弓窮一升白芷一升付子卅果凡四物皆冶父且置銅器中用淳三升漬之卒時取猪肪三斤先前之先取雞子中黃者置梧中撓之三百取藥成以五分匕一置雞子中復撓之二百薄以塗其雍者上空者遺之中央大如錢藥乾復塗之如前法三塗去其故藥其毋農者行𢠚已有農者潰毋得力作禁食諸采置上甚創恿皆中之良勿傳也逆氣吞之喉痹吞之摩之心腹恿吞之嗌恿吞之血府恿吞之摩之咽乾摩之齒恿塗之昏塗之鼻中生惡傷塗之亦可吞之皆大如酸棗稍咽之腸中有益為度摩之皆三乾而止此方禁又中邚人乳餘吞之氣龍裹藥以縠塞之耳日一易之金創塗之頭恿風塗之以三指摩𢇢吞之身生惡氣塗之此膏藥大良勿得傳六日脛中當恿至足下傷膿出逐服之卅日知𢠚六十日須麇生音聲雖㯕敗能復精鼻柱鼻中當血出若膿出去死肉藥用代廬如巴豆各一分并合和以絮裹藥塞鼻諸息肉皆出不出更飲調中藥用亭磿二分甘遂二分大黃一分冶合和以米汁飲一刀圭日三四飲徵出乃止即鼻不利藥用利廬一本亭磨二分付子一分早莢一分皆并父且合和以醇醯漬卒時去宰以汁灌其鼻中徵當下從大便出老瘦者以人事感之此藥亦中治毒養如飲食數禁不傳也二升復置水一升其中為東鄉造炊以葦薪若桑相得丸之大如吾實先餔食吞二丸日再服藥一四兩消石二兩人參方風細辛各一兩肥棗五右治百病方
